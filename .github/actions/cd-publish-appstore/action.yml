name: CD - Publish to App Store Connect
description: Validate and upload an iOS/macOS artifact to App Store Connect.

inputs:
  platform:
    required: true
  artifact_name:
    required: true
  IPA_PATH:
    required: true
  OUTPUT_DIR:
    required: true
  PKG_PATH:
    required: true
  APPSTORECONNECT_API_PRIVATE_KEY:
    required: true
  APPSTORECONNECT_API_KEY:
    required: true
  APPSTORECONNECT_ISSUER_ID:
    required: true

runs:
  using: composite
  # The `-f` paths below use the GitHub Actions ternary
  # `platform == 'ios' && inputs.IPA_PATH || inputs.PKG_PATH`, which only selects
  # IPA_PATH because IPA_PATH is a non-empty constant. If IPA_PATH ever
  # becomes empty/falsy it would silently fall through to PKG_PATH.
  steps:
    - name: Import App Store Connect API Private Key
      shell: bash
      run: |
        mkdir -p ${{ env.TARGET_DIR }}

        if [ ! -f ${{ env.TARGET_DIR }}/${{ env.TARGET_FILE }} ]; then
          echo -n ${{ inputs.APPSTORECONNECT_API_PRIVATE_KEY }} | base64 -d > ${{ env.TARGET_DIR }}/${{ env.TARGET_FILE }}
          chmod 400 ${{ env.TARGET_DIR }}/${{ env.TARGET_FILE }}
          ls -l ${{ env.TARGET_DIR }}/${{ env.TARGET_FILE }}
        fi
      env:
        TARGET_DIR: ~/.appstoreconnect/private_keys
        TARGET_FILE: AuthKey_${{ inputs.APPSTORECONNECT_API_KEY }}.p8

    - name: Download artifact
      uses: actions/download-artifact@v8
      with:
        name: ${{ inputs.artifact_name }}
        path: ${{ inputs.OUTPUT_DIR }}

    - name: validate
      shell: bash
      run: >
        xcrun altool
        --validate-app
        --type ${{ inputs.platform }}
        -f ${{ inputs.platform == 'ios' && inputs.IPA_PATH || inputs.PKG_PATH }}
        --apiKey ${{ inputs.APPSTORECONNECT_API_KEY }}
        --apiIssuer ${{ inputs.APPSTORECONNECT_ISSUER_ID }}

    - name: upload
      shell: bash
      run: >
        xcrun altool
        --upload-app
        --type ${{ inputs.platform }}
        -f ${{ inputs.platform == 'ios' && inputs.IPA_PATH || inputs.PKG_PATH }}
        --apiKey ${{ inputs.APPSTORECONNECT_API_KEY }}
        --apiIssuer ${{ inputs.APPSTORECONNECT_ISSUER_ID }}
